<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskHero - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow-lg p-4" style="width: 100%; max-width: 400px;">
            <div class="text-center mb-4">
                <h1 class="h3 mb-3 fw-bold text-primary">TaskHero</h1>
                <p class="text-muted">Gestiona tus tareas y sube de nivel</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Correo Electrónico</label>
                    <input type="email" id="loginEmail" class="form-control" required placeholder="tu@ejemplo.com">
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" id="loginPassword" class="form-control" required placeholder="******">
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Entrar al Calabozo</button>
            </form>

            <div class="text-center mt-4">
                <p class="mb-0">¿No tienes cuenta? <a href="#" id="showRegister">Regístrate aquí</a></p>
            </div>

            <!-- Register Form (Hidden by default) -->
            <form id="registerForm" class="d-none">
                <div class="mb-3">
                    <label class="form-label">Nombre de Héroe</label>
                    <input type="text" id="regNombre" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" id="regEmail" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" id="regPassword" class="form-control" required minlength="6">
                </div>
                <button type="submit" class="btn btn-success w-100">Crear Héroe</button>
                <div class="text-center mt-3">
                    <a href="#" id="showLogin">Volver al Login</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
